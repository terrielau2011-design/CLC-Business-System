<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLC 財務規劃系統｜首頁</title>
    <link rel="stylesheet" href="https://terrielau2011-design.github.io/CLC-Business-System/assets/css/style.css">
     <style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, "Microsoft JhengHei", sans-serif;}
body{background:#f6f8fa;}
/* 全域強制所有section自動變卡片，唔使手動加class */
section {background:#fff;border-radius:10px;box-shadow:0 1px 12px rgba(0,0,0,0.06);padding:24px;margin-bottom:24px;}
.page-header {background:#2563eb;color:#fff;padding:20px 32px;margin-bottom:28px;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.page-header h1 {font-size:30px;margin-bottom:14px;}
.nav-bar a {color:#fff;font-size:19px;margin-right:14px;text-decoration:none;opacity:0.9;}
.nav-bar a.active {font-weight:bold;text-decoration:underline;opacity:1;}
.container {max-width:1480px;margin:0 auto;padding:0 32px;}
.panel {background:#fff;border-radius:10px;box-shadow:0 1px 12px rgba(0,0,0,0.06);padding:24px;margin-bottom:24px;}
.panel h2,.panel h3 {color:#1a1a1a;margin-bottom:16px;border-left:4px solid #2563eb;padding-left:12px;}
.btn-primary {background:#2563eb;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(37, 99, 235, 0.25);transition:background 0.2s;}
.btn-primary:hover {background:#1d4ed8;}
.badge {display:inline-block;background:#e0eaff;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:14px;margin:4px 6px 4px 0;}
.grid-two {display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;}
.data-row {display:flex;margin:8px 0;}
.data-row .label {width:140px;color:#555;font-weight:500;}
.compare-table {border-collapse:collapse;width:100%;margin:20px 0;border-radius:8px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
.compare-table th,.compare-table td {border:1px solid #e5e7eb;padding:12px 16px;text-align:center;background:#fff;}
.compare-table th {background:#eff6ff;color:#1d4ed8;font-weight:500;}
.checkbox-wrap {margin:16px 0;padding:16px;background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.checkbox-item {display:inline-block;margin:8px 12px;font-size:16px;}
.chart-wrap {margin-top:24px;height:420px;background:#fff;padding:20px;border-radius:10px;box-shadow:0 1px 10px rgba(0,0,0,0.05);}
h2 {font-size:26px;margin:20px 0;color:#111;}
.ctrl-row {margin:18px 0;font-size:18px;display:flex;align-items:center;gap:12px;}
select {padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:16px;}
input[type="text"] {padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:16px;}
  .tag-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
}
.tag-wrap * {
    display: inline-block;
    background: #e0eaff;
    color: #1d4ed8;
    padding: 4px 12px;
    border-radius: 24px;
    font-size: 14px;
    border: none !important;
    box-shadow: none !important;
}

</style>
</head>
<body>
    <header class="page-header">
        <h1>CLC-Business-System 產品規劃平台</h1>
        <div class="nav-bar">
            <a href="index.html" class="active">首頁</a>
            <a href="compare.html">產品對比</a>
            <a href="saving_plan.html">儲蓄規劃</a>
            <a href="finance_leverage.html">融資槓桿</a>
            <a href="report.html">報告匯出</a>
        </div>
    </header>

    <main class="container">
        <section class="load-block">
            <button id="loadDataBtn" class="btn-primary">載入產品數據</button>
            <button id="clearCacheBtn" class="btn-secondary">清除本地緩存</button>
            <p id="loadStatus" class="status-text">未載入數據</p>
        </section>

        <section class="tag-filter-block">
            <h2>產品標籤分類</h2>
            <div id="tagListWrap" class="tag-wrap"></div>
        </section>

        <section class="product-card-wrap" id="productWrap"></section>
    </main>

    <!-- 底層依賴模塊 -->
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/sync/sync.js"></script>
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/compare/compare.js"></script>
    <script>
        const loadBtn = document.getElementById("loadDataBtn");
        const clearBtn = document.getElementById("clearCacheBtn");
        const statusText = document.getElementById("loadStatus");
        const tagWrap = document.getElementById("tagListWrap");
        const productWrap = document.getElementById("productWrap");

        // 載入數據按鈕
        loadBtn.addEventListener("click", async () => {
            statusText.textContent = "正在拉取遠端產品數據...";
            const data = await DataSync.loadAllData();
            if (!data) {
                statusText.textContent = "數據載入失敗，請檢查網絡或倉庫檔案";
                return;
            }
            statusText.textContent = `載入成功，共${data.products.length}款產品`;
            await ProductCompare.initData();
            renderAllTags();
            renderAllProducts(data.products);
        });

        // 清除緩存按鈕
        clearBtn.addEventListener("click", () => {
            DataSync.clearCache();
            statusText.textContent = "本地緩存已清空，請重新載入數據";
            tagWrap.innerHTML = "";
            productWrap.innerHTML = "";
        });

        // 渲染全部標籤按鈕
        function renderAllTags() {
            const allTags = ProductCompare.getAllTagList();
            tagWrap.innerHTML = "";
            allTags.forEach(tag => {
                const tagBtn = document.createElement("button");
                tagBtn.className = "tag-btn";
                tagBtn.textContent = tag;
                tagBtn.onclick = () => filterProductByTag(tag);
                tagWrap.appendChild(tagBtn);
            });
        }

        // 渲染全部產品卡片
        function renderAllProducts(productList) {
            productWrap.innerHTML = "";
            productList.forEach(p => {
                const allTags = ProductCompare.getAllTags(p);
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${p.prod_name}</h3>
                    <p>承保公司：${p.ins_name}</p>
                    <p>入場門檻：${ProductCompare.getMinPremText(p)}</p>
                    <p>IRR15：${p.irr_15 ?? "無"}｜IRR20：${p.irr_20 ?? "無"}</p>
                    <p>回本週年：${p.break_year ?? "無"}</p>
                    <div class="tag-small">${allTags.join("、")}</div>
                    <div class="card-btn-group">
                        <a href="saving_plan.html?id=${p.prod_id}" class="btn-sm">規劃試算</a>
                        <a href="report.html?id=${p.prod_id}" class="btn-sm">生成報告</a>
                    </div>
                `;
                productWrap.appendChild(card);
            });
        }

        // 標籤篩選產品
        function filterProductByTag(tagName) {
            const filterList = ProductCompare.filterByTag(tagName);
            renderAllProducts(filterList);
        }
    </script>
</body>
</html>
