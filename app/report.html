<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLC 產品規劃報告匯出</title>
    <link rel="stylesheet" href="stylesheet" href="https://terrielau2011-design.github.io/CLC-Business-System/assets/css/style.css">
    <style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, "Microsoft JhengHei", sans-serif;}
body{background:#f6f8fa;}
.page-header {background:#2563eb;color:#fff;padding:20px 32px;margin-bottom:28px;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.page-header h1 {font-size:30px;margin-bottom:14px;}
.nav-bar a {color:#fff;font-size:19px;margin-right:14px;text-decoration:none;opacity:0.9;}
.nav-bar a.active {font-weight:bold;text-decoration:underline;opacity:1;}
.container {max-width:1480px;margin:0 auto;padding:0 32px;}
/* 卡片面板樣式（還原舊系統陰影分區） */
.panel {background:#fff;border-radius:10px;box-shadow:0 1px 12px rgba(0,0,0,0.06);padding:24px;margin-bottom:24px;}
.panel h2,.panel h3 {color:#1a1a1a;margin-bottom:16px;border-left:4px solid #2563eb;padding-left:12px;}
/* 按鈕美化 */
.btn-primary {background:#2563eb;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(37, 99, 235, 0.25);transition:background 0.2s;}
.btn-primary:hover {background:#1d4ed8;}
/* 產品分類標籤badge */
.badge {display:inline-block;background:#e0eaff;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:14px;margin:4px 6px 4px 0;}
/* 兩欄資訊網格 */
.grid-two {display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;}
.data-row {display:flex;margin:8px 0;}
.data-row .label {width:140px;color:#555;font-weight:500;}
/* 對比表格美化 */
.compare-table {border-collapse:collapse;width:100%;margin:20px 0;border-radius:8px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
.compare-table th,.compare-table td {border:1px solid #e5e7eb;padding:12px 16px;text-align:center;background:#fff;}
.compare-table th {background:#eff6ff;color:#1d4ed8;font-weight:500;}
/* 勾選框區塊白色卡片 */
.checkbox-wrap {margin:16px 0;padding:16px;background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.checkbox-item {display:inline-block;margin:8px 12px;font-size:16px;}
/* 圖表容器卡片 */
.chart-wrap {margin-top:24px;height:420px;background:#fff;padding:20px;border-radius:10px;box-shadow:0 1px 10px rgba(0,0,0,0.05);}
h2 {font-size:26px;margin:20px 0;color:#111;}
.ctrl-row {margin:18px 0;font-size:18px;display:flex;align-items:center;gap:12px;}
select {padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:16px;}
input[type="text"] {padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:16px;}
.tag-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
}
.tag-wrap * {
    display: inline-block;
    background: #e0eaff;
    color: #1d4ed8;
    padding: 4px 12px;
    border-radius: 24px;
    font-size: 14px;
    border: none !important;
    box-shadow: none !important;
}
/* 每款產品獨立卡片分開排版 */
#productWrap > div {
    background:#fff;
    border-radius:10px;
    box-shadow:0 1px 8px rgba(0,0,0,0.05);
    padding:20px;
    margin-bottom:20px;
}
/* 產品資訊兩欄整齊對齊 */
#productWrap p {
    display:grid;
    grid-template-columns:140px 1fr;
    gap:8px;
    margin:6px 0;
}
#productWrap p:first-child {
    font-size:20px;
    font-weight:bold;
    grid-template-columns:1fr;
    margin-bottom:12px;
}
#productWrap p:first-child {
    font-size:20px;
    font-weight:bold;
    grid-template-columns:1fr;
    margin-bottom:12px;
}

/* 新增產品底部標籤樣式，放喺呢度 */
#productWrap p:last-of-type span,
#productWrap p:last-of-type {
    display: inline-block;
    background: #e0eaff;
    color: #1d4ed8;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 13px;
    margin: 3px 4px;
}
#productWrap p:last-of-type {
    background: transparent;
    padding: 0;
    margin: 10px 0 0 0;
}

</style>

</style>
</head>
<body>
    <header class="page-header">
        <h1>產品完整規劃報告生成器</h1>
        <div class="nav-bar">
            <a href="index.html">首頁</a>
            <a href="compare.html">產品對比</a>
            <a href="saving_plan.html">儲蓄規劃</a>
            <a href="finance_leverage.html">融資槓桿</a>
            <a href="report.html" class="active">報告匯出</a>
        </div>
    </header>

    <main class="container">
        <section class="load-block">
            <button id="loadDataBtn" class="btn-primary">載入產品數據</button>
            <p id="loadStatus" class="status-text">未載入數據</p>
        </section>

        <section class="report-setting">
            <div class="form-row">
                <label>選擇產品：
                    <select id="prodSelect">
                        <option value="">請先載入數據</option>
                    </select>
                </label>
            </div>
            <div class="form-row">
                <label>計算幣種：
                    <select id="currencySelect">
                        <option value="USD">USD 美元</option>
                        <option value="HKD">HKD 港幣</option>
                        <option value="CNY">CNY 人民幣</option>
                    </select>
                </label>
            </div>
            <div class="form-row">
                <label>模擬貸款利率(%)：
                    <input type="number" id="loanRate" value="3.2" step="0.1" min="1" max="8">
                </label>
            </div>
            <div class="form-row">
                <label>持有年期：
                    <select id="holdYear">
                        <option value="15">15 年</option>
                        <option value="20" selected>20 年</option>
                    </select>
                </label>
            </div>
            <button id="genReportBtn" class="btn-primary">生成完整報告</button>
            <button id="copyWhatsAppBtn" class="btn-secondary">複製WhatsApp分享文案</button>
        </section>

        <section class="report-card" id="reportWrap"></section>
        <section class="chart-wrap" id="reportChartWrap"></section>
    </main>

    <!-- 全域依賴模塊 -->
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/sync/sync.js"></script>
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/compare/compare.js"></script>
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/saving_calc/saving_calc.js"></script>
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/finance_calc/finance_calc.js"></script>
    <script src="https://terrielau2011-design.github.io/CLC-Business-System/modules/report_pdf/report_pdf.js"></script>
    <script src="stylesheet" href="https://terrielau2011-design.github.io/CLC-Business-System/assets/charts/finConfig.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const loadBtn = document.getElementById("loadDataBtn");
        const statusText = document.getElementById("loadStatus");
        const prodSelect = document.getElementById("prodSelect");
        const currencySelect = document.getElementById("currencySelect");
        const loanRateInput = document.getElementById("loanRate");
        const holdYearSelect = document.getElementById("holdYear");
        const genReportBtn = document.getElementById("genReportBtn");
        const copyWhatsAppBtn = document.getElementById("copyWhatsAppBtn");
        const reportWrap = document.getElementById("reportWrap");
        const chartWrap = document.getElementById("reportChartWrap");
        let allProducts = [];
        let currentWhatsText = "";
        let reportChart = null;

        // 載入產品數據
        loadBtn.addEventListener("click", async () => {
            statusText.textContent = "載入遠端產品數據中...";
            const data = await DataSync.loadAllData();
            if (!data) {
                statusText.textContent = "數據載入失敗，請檢查網絡與倉庫檔案";
                return;
            }
            allProducts = data.products;
            await SavingCalc.initData();
            await FinanceCalc.initData();
            statusText.textContent = `載入${allProducts.length}款產品，可生成對應報告`;
            renderProductOption();
        });

        // 渲染全部產品下拉選單
        function renderProductOption() {
            prodSelect.innerHTML = `<option value="">請選擇產品</option>`;
            allProducts.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p.prod_id;
                opt.textContent = `${p.prod_id} - ${p.prod_name}`;
                prodSelect.appendChild(opt);
            });
        }

        // 生成完整報告內容
        genReportBtn.addEventListener("click", async () => {
            const prodId = prodSelect.value;
            const currency = currencySelect.value;
            const loanRate = Number(loanRateInput.value);
            const holdYear = Number(holdYearSelect.value);
            if (!prodId) {
                alert("請先選擇一款產品");
                return;
            }
            // 調用報告模塊生成完整數據
            const reportData = await ReportPDF.buildFullReport(prodId, currency, loanRate, holdYear);
            if (!reportData) {
                reportWrap.innerHTML = "<p class="error-text">報告生成失敗，產品數據異常</p>";
                return;
            }
            // 儲存WhatsApp分享文案
            currentWhatsText = await ReportPDF.buildWhatsAppText(prodId, currency);
            // 渲染報告文字內容
            renderReportHtml(reportData, currency);
            // 渲染融資曲線圖
            renderReportChart(reportData.chart);
        });

        // 複製WhatsApp文案到剪貼簿
        copyWhatsAppBtn.addEventListener("click", async () => {
            if (!currentWhatsText) {
                alert("請先生成報告後再複製分享文案");
                return;
            }
            const copyResult = await ReportPDF.copyToClipboard(currentWhatsText);
            if (copyResult) {
                alert("WhatsApp分享文案已複製到剪貼簿！");
            } else {
                alert("複製失敗，請手動複製報告內文字");
            }
        });

        // 渲染報告HTML結構
        function renderReportHtml(data, currency) {
            const basic = data.basic;
            const points = data.sellingPoints.map(p => `<li>${p}</li>`).join("");
            let finHtml = "";
            if (data.finance) {
                finHtml = `
                <div class="report-block">
                    <h3>融資槓桿模擬結果</h3>
                    <p>原始總保費：${currency}${data.finance.totalOriginalPrem}</p>
                    <p>自付金額：${currency}${data.finance.selfPay}</p>
                    <p>期末保單價值：${currency}${data.finance.assetFinal}</p>
                    <p>扣除貸款淨資產：${currency}${data.finance.netAsset}</p>
                    <p>模擬淨回報率：${data.finance.netROI}%</p>
                </div>`;
            }
            reportWrap.innerHTML = `
                <div class="report-block">
                    <h2>${basic.prodName}｜完整財務規劃報告</h2>
                    <div class="grid-row">
                        <div class="grid-col">
                            <h3>產品基礎資訊</h3>
                            <p>承保公司：${basic.insName}</p>
                            <p>支援幣種：${basic.currencyList.join("/")}</p>
                            <p>繳費年期：${basic.payTermList.join("/")}</p>
                            <p>全期原始總保費：${currency}${basic.totalOriginalPrem}</p>
                            <p>15週年IRR：${basic.irr15}</p>
                            <p>20週年IRR：${basic.irr20}</p>
                            <p>回本週年：${basic.breakYear}</p>
                            <p>收益屬性：${basic.guarantee}</p>
                            <p>受保人轉換：${basic.transferAssured}</p>
                            <p>年度分紅提取：${basic.annualWithdraw}</p>
                        </div>
                        <div class="grid-col">
                            <h3>核心競爭賣點</h3>
                            <ul>${points}</ul>
                            <h3>適合客戶場景</h3>
                            <p>${data.sceneDesc}</p>
                            <h3>產品標籤判定</h3>
                            <p>T+2短期回本：${data.tagMark.isShortSaving ? "✅ 符合" : "❌ 不符合"}</p>
                            <p>T+10教育基金門檻：${data.tagMark.isEduFund ? "✅ 達標" : "❌ 未達標"}</p>
                        </div>
                    </div>
                    ${finHtml}
                </div>
            `;
        }

        // 渲染報告頁曲線圖
        function renderReportChart(chartData) {
            chartWrap.innerHTML = `<canvas id="reportChartCanvas"></canvas>`;
            const ctx = document.getElementById("reportChartCanvas").getContext("2d");
            if (reportChart) reportChart.destroy();
            reportChart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: chartData.years,
                    datasets: [
                        {label:"基準收益", data:chartData.baseSeries, borderColor:finConfig.baseLine, fill:false},
                        {label:"壓測下行", data:chartData.stressSeries, borderColor:finConfig.stressLine, fill:false}
                    ]
                },
                options: finConfig.baseOption
            });
        }
    </script>
</body>
</html>
